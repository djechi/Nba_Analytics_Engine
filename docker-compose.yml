services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: sport_data
      POSTGRES_USER: sport_data_user
      POSTGRES_PASSWORD: sport_data_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sport_data
      SPRING_DATASOURCE_USERNAME: sport_data_user
      SPRING_DATASOURCE_PASSWORD: sport_data_pass

volumes:
  pgdata: